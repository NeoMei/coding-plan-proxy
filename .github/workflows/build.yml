name: Build & Release
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: codexproxy_${{ github.ref_name }}_amd64
            ext: deb
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: CodexProxy_${{ github.ref_name }}_aarch64
            ext: dmg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: CodexProxy_${{ github.ref_name }}_x64
            ext: msi

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: "${{ matrix.target }}" }

      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev

      - run: npm install
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'CodexProxy ${{ github.ref_name }}'
          releaseBody: 'See CHANGELOG for details.'
          args: --target ${{ matrix.target }}
